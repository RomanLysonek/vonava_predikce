name: Verify and deploy Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: uv sync --frozen --group dev
      - run: uv run pytest tests/ -m "not integration" -q
      - run: node tests/webapp_smoke_test.js
      - run: uv run python ml/publish_dashboard.py --check

  publish:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - id: pages
        uses: actions/configure-pages@v5
        continue-on-error: true
      - if: steps.pages.outcome == 'failure'
        run: echo "::notice::Generated Pages output passed validation; deployment is waiting for Pages to be enabled."
      - if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        if: steps.pages.outcome == 'success'
        uses: actions/deploy-pages@v4
